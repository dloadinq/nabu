<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nabu.Local: Inference Status</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            max-width: 600px;
            margin: 2rem auto;
            padding: 0 1rem;
            background: #1a1a2e;
            color: #eee;
        }

        h1 {
            color: #4ade80;
            font-size: 1.5rem;
        }

        .card {
            background: #16213e;
            border-radius: 8px;
            padding: 1.25rem;
            margin: 1rem 0;
        }

        .label {
            color: #94a3b8;
            font-size: 0.85rem;
        }

        .value {
            font-size: 1.1rem;
            font-weight: 600;
            color: #4ade80;
            margin-top: 0.25rem;
        }

        .note {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
<h1>Nabu.Local</h1>
<div class="card">
    <div class="label">Mode</div>
    <div class="value">{{Api}}</div>
</div>
<div class="card">
    <div class="label">Platform</div>
    <div class="value">{{Os}}</div>
</div>
<div class="card">
    <div class="label">Runtime ID</div>
    <div class="value">{{Rid}}</div>
</div>
<div class="card">
    <div class="label">Model</div>
    <div class="value">{{Model}}</div>
</div>

</body>
</html>
